name: Build Tauri (Windows)

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

env:
  MAA_VERSION: "v5.10.0"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # 删除 package-lock.json，强制使用 pnpm
      # -----------------------------
      - name: Remove package-lock.json
        run: Remove-Item -Path "package-lock.json" -Force -ErrorAction SilentlyContinue

      # -----------------------------
      # pnpm 设置
      # -----------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # -----------------------------
      # Node.js + pnpm 缓存
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -----------------------------
      # 安装 Rust
      # -----------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # -----------------------------
      # Setup Git (fix CRLF issue)
      # -----------------------------
      - name: Setup Git (fix CRLF issue)
        run: git config --global core.autocrlf false

      # -----------------------------
      # Cargo/Rust 缓存（Tauri 提速关键点）
      # -----------------------------
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      # -----------------------------
      # 下载 MaaFramework SDK 并设置环境变量
      # -----------------------------
      - name: Download MaaFramework SDK
        id: download-sdk
        run: |
          $url = "https://github.com/MaaXYZ/MaaFramework/releases/download/${{ env.MAA_VERSION }}/MAA-win-x86_64-${{ env.MAA_VERSION }}.zip"
          Write-Host "Downloading from $url"

          $zipPath = "MAA-sdk.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing

          # 解压到临时目录
          $tempDir = "MAA-temp"
          Expand-Archive -Path $zipPath -DestinationPath $tempDir -Force
          Remove-Item $zipPath

          # 查找解压后的文件夹
          $extractedFolder = Get-ChildItem -Path $tempDir -Directory | Select-Object -First 1
          if (-not $extractedFolder) {
            throw "No folder found in extracted archive"
          }

          Write-Host "Extracted folder: $($extractedFolder.Name)"

          # 移动到 src-tauri 目录，重命名为期望的名称
          $targetName = "MAA-win-x86_64-${{ env.MAA_VERSION }}"
          $targetPath = "src-tauri/$targetName"

          # 如果目标已存在，先删除
          if (Test-Path $targetPath) {
            Remove-Item $targetPath -Recurse -Force
          }

          Move-Item -Path $extractedFolder.FullName -Destination $targetPath -Force
          Remove-Item $tempDir -Force -Recurse -ErrorAction SilentlyContinue

          Write-Host "MaaFramework SDK ready at $targetPath"

          # 验证目录结构
          $libPath = "$targetPath/lib"
          $includePath = "$targetPath/include"
          $binPath = "$targetPath/bin"

          if (-not (Test-Path $libPath)) {
            throw "lib directory not found at $libPath"
          }
          if (-not (Test-Path $includePath)) {
            throw "include directory not found at $includePath"
          }
          if (-not (Test-Path "$libPath/MaaFramework.lib")) {
            throw "MaaFramework.lib not found in $libPath"
          }

          Write-Host "SDK structure verified:"
          Write-Host "  lib: $libPath"
          Write-Host "  include: $includePath"
          Write-Host "  bin: $binPath"

          # 设置全局环境变量（使用绝对路径）
          $sdkFullPath = "${{ github.workspace }}\src-tauri\$targetName"
          Write-Host "Setting MAA_SDK_PATH=$sdkFullPath"
          "MAA_SDK_PATH=$sdkFullPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # -----------------------------
      # 安装前端依赖
      # -----------------------------
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # -----------------------------
      # 从 Tag 设置应用版本号
      # -----------------------------
      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith('v')) {
            throw "Tag must start with v, got $tag"
          }
          $version = $tag.Substring(1)
          Write-Host "Using version $version"

          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # -----------------------------
      # 生成 Change Log
      # -----------------------------
      - name: Generate changelog
        id: changelog
        run: |
          $tag = "${{ github.ref_name }}"
          $prevTag = ""
          try {
            $prevTag = git describe --tags --abbrev=0 --match "v*" "$tag^"
          } catch {
            $prevTag = ""
          }

          $tagDate = ""
          try {
            $tagDate = git log -1 --format=%cs $tag
          } catch {
            $tagDate = ""
          }
          if (-not $tagDate) {
            $tagDate = (Get-Date).ToString("yyyy-MM-dd")
          }

          if ($prevTag) {
            $range = "$prevTag..$tag"
          } else {
            $range = "$tag"
          }

          $log = git log $range --pretty=format:"- %s (%h)" --no-merges
          if (-not $log) { $log = "- (no changes)" }

          $body = @(
            "# MaaInspector 更新日志",
            "",
            "## $tag ($tagDate)",
            "### 变更",
            $log,
            ""
          ) -join "`n"

          $outPath = "public/changelog.md"
          $body | Out-File -FilePath $outPath -Encoding utf8

          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # -----------------------------
      # 构建 Tauri 应用
      # -----------------------------
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MaaInspector ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          prerelease: false
          releaseDraft: false

          includeDebug: false
          includeRelease: true

          includeUpdaterJson: true
          updaterJsonPreferNsis: true

          projectPath: "."
          tauriScript: "pnpm tauri"

          uploadPlainBinary: false