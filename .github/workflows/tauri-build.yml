name: Build Tauri (Windows)

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

env:
  MAA_VERSION: "v5.10.0"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove package-lock.json
        run: Remove-Item -Path "package-lock.json" -Force -ErrorAction SilentlyContinue

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Git
        run: git config --global core.autocrlf false

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Download and extract MaaFramework SDK
        run: |
          $url = "https://github.com/MaaXYZ/MaaFramework/releases/download/${{ env.MAA_VERSION }}/MAA-win-x86_64-${{ env.MAA_VERSION }}.zip"
          $targetPath = "src-tauri/MAA-win-x86_64-${{ env.MAA_VERSION }}"

          Write-Host "Downloading from $url to $targetPath"

          # 如果目标已存在，先删除
          if (Test-Path $targetPath) {
            Remove-Item $targetPath -Recurse -Force
          }

          # 直接解压到目标路径
          $zipPath = "MAA-sdk.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $targetPath -Force
          Remove-Item $zipPath

          # 设置环境变量
          $sdkFullPath = "${{ github.workspace }}\$targetPath"
          "MAA_SDK_PATH=$sdkFullPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "MAA_SDK_PATH=$sdkFullPath"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.Substring(1)
          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Generate changelog
        id: changelog
        run: |
          $tag = "${{ github.ref_name }}"
          $prevTag = git describe --tags --abbrev=0 --match "v*" "$tag^" 2>$null
          $range = if ($prevTag) { "$prevTag..$tag" } else { "$tag" }
          $log = git log $range --pretty=format:"- %s (%h)" --no-merges
          if (-not $log) { $log = "- (no changes)" }

          $body = "# MaaInspector 更新日志`n`n## $tag`n`n### 变更`n$log`n"
          $body | Out-File -FilePath "public/changelog.md" -Encoding utf8

          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MaaInspector ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          prerelease: false
          releaseDraft: false
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          projectPath: "."
          tauriScript: "pnpm tauri"