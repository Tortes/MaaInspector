name: Build Tauri (Windows)

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Node.js + npm 缓存
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # -----------------------------
      # 安装 Rust
      # -----------------------------
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # -----------------------------
      # Cargo/Rust 缓存（Tauri 提速关键点）
      # -----------------------------
      - name: Setup Git (fix CRLF issue)
        run: git config --global core.autocrlf false

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true


      # -----------------------------
      # 安装前端依赖
      # -----------------------------
      - name: Install frontend deps
        run: npm ci

      # -----------------------------
      # 从 Tag 设置应用版本号
      # -----------------------------
      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith('v')) {
            throw "Tag must start with v, got $tag"
          }
          $version = $tag.Substring(1)
          Write-Host "Using version $version"

          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # -----------------------------
      # 生成 Change Log
      # -----------------------------
      - name: Generate changelog
        id: changelog
        run: |
          $tag = "${{ github.ref_name }}"
          $prevTag = ""
          try {
            $prevTag = git describe --tags --abbrev=0 --match "v*" "$tag^"
          } catch {
            $prevTag = ""
          }

          if ($prevTag) {
            $range = "$prevTag..$tag"
            $title = "## $tag (since $prevTag)"
          } else {
            $range = "$tag"
            $title = "## $tag"
          }

          $log = git log $range --pretty=format:"- %s (%h)" --no-merges
          if (-not $log) { $log = "- (no changes)" }

          $body = @(
            $title,
            "",
            $log
          ) -join "`n"

          $outPath = "public/changelog.md"
          $body | Out-File -FilePath $outPath -Encoding utf8

          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # -----------------------------
      # 准备嵌入式 Python
      # -----------------------------
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            python-embedded
            backend/.venv
          key: ${{ runner.os }}-python-${{ hashFiles('src-tauri/backend/requirements.txt', 'setup_embedded_python.py') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Prepare embedded Python
        env:
          PYTHONIOENCODING: utf-8
        run: python setup_embedded_python.py

      # -----------------------------
      # 构建 Tauri 应用
      # -----------------------------
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MaaInspector ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          prerelease: false
          releaseDraft: false

          includeDebug: false
          includeRelease: true

          includeUpdaterJson: true
          updaterJsonPreferNsis: true

          projectPath: "."
          tauriScript: "npm run tauri"

          uploadPlainBinary: false
