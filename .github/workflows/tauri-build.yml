name: Build Tauri (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      runner:
        description: 'GitHub runner type: github-hosted or self-hosted'
        required: false
        default: 'github-hosted'
        type: choice
        options:
          - github-hosted
          - self-hosted
      maa_framework_version:
        description: 'MaaFramework release version or tag, for example release or v5.10.0'
        required: false
        default: 'release'
      maa_framework_archive_path:
        description: 'Local MaaFramework zip path for self-hosted runner only'
        required: false
        default: ''
      maa_framework_download_url:
        description: 'Download URL for MaaFramework zip, used by github-hosted runners or as an override'
        required: false
        default: ''
      maa_framework_artifact_url:
        description: 'GitHub Actions artifact URL, for example https://github.com/Tortes/MaaFramework/actions/runs/27860032689/artifacts/7762101313'
        required: false
        default: ''
      release_tag:
        description: 'Release tag to build when manually dispatched, for example v0.7.0'
        required: false

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

env:
  DEFAULT_MAA_FRAMEWORK_VERSION: "release"
  DEFAULT_MAA_FRAMEWORK_REPOSITORY: "Tortes/MaaFramework"
  DEFAULT_MAA_FRAMEWORK_ASSET_NAME: "MAA-win-x86_64.zip"

jobs:
  build:
    runs-on: ${{ inputs.runner == 'self-hosted' && fromJSON('["self-hosted","Windows"]') || 'windows-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove package-lock.json
        run: Remove-Item -Path "package-lock.json" -Force -ErrorAction SilentlyContinue

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Git
        run: git config --global core.autocrlf false

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Resolve release inputs
        id: release
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if (-not [string]::IsNullOrWhiteSpace("${{ inputs.release_tag }}")) {
              $tag = "${{ inputs.release_tag }}"
            }
            else {
              $latestTag = git tag --sort=-creatordate | Select-Object -First 1
              if ([string]::IsNullOrWhiteSpace($latestTag)) {
                throw "No git tag found. Provide workflow_dispatch.release_tag explicitly."
              }
              $segments = $latestTag.TrimStart('v').Split('.')
              if ($segments.Length -lt 3) {
                throw "Latest git tag '$latestTag' is not a semantic version."
              }
              $major = [int]$segments[0]
              $minor = [int]$segments[1]
              $patch = [int]$segments[2]
              $tag = "v$major.$minor.$($patch + 1)"
            }
          }

          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with v, got '$tag'"
          }

          $maaVersion = "${{ env.DEFAULT_MAA_FRAMEWORK_VERSION }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and -not [string]::IsNullOrWhiteSpace("${{ inputs.maa_framework_version }}")) {
            $maaVersion = "${{ inputs.maa_framework_version }}"
          }
          if ("${{ env.DEFAULT_MAA_FRAMEWORK_REPOSITORY }}" -eq "MaaXYZ/MaaFramework" -and -not $maaVersion.StartsWith("v")) {
            $maaVersion = "v$maaVersion"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$($tag.Substring(1))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "maa_version=$maaVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "runner=${{ inputs.runner }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "MAA_FRAMEWORK_VERSION=$maaVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MAA_FRAMEWORK_REPOSITORY=${{ env.DEFAULT_MAA_FRAMEWORK_REPOSITORY }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MAA_FRAMEWORK_ASSET_NAME=${{ env.DEFAULT_MAA_FRAMEWORK_ASSET_NAME }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.maa_framework_artifact_url }}")) {
            $artifactUrl = "${{ inputs.maa_framework_artifact_url }}"
            if ($artifactUrl -match '/artifacts/([0-9]+)$') {
              $artifactId = $Matches[1]
              $apiUrl = "https://api.github.com/repos/Tortes/MaaFramework/actions/artifacts/$artifactId/zip"
              "MAA_FRAMEWORK_DOWNLOAD_URL=$apiUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            else {
              throw "Unsupported maa_framework_artifact_url format: $artifactUrl"
            }
          }
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.maa_framework_download_url }}")) {
            "MAA_FRAMEWORK_DOWNLOAD_URL=${{ inputs.maa_framework_download_url }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if ("${{ inputs.runner }}" -eq "self-hosted" -and -not [string]::IsNullOrWhiteSpace("${{ inputs.maa_framework_archive_path }}")) {
            "MAA_FRAMEWORK_ARCHIVE_PATH=${{ inputs.maa_framework_archive_path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Prepare MaaFramework SDK
        env:
          MAA_FRAMEWORK_TOKEN: ${{ secrets.MAA_FRAMEWORK_TOKEN }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.maa_framework_archive_path }}")) {
            .\scripts\prepare-maa-framework.ps1 -ArchivePath "${{ inputs.maa_framework_archive_path }}"
          }
          elseif (-not [string]::IsNullOrWhiteSpace("${{ inputs.maa_framework_artifact_url }}")) {
            .\scripts\prepare-maa-framework.ps1 -DownloadUrl "$env:MAA_FRAMEWORK_DOWNLOAD_URL" -GithubToken "$env:MAA_FRAMEWORK_TOKEN"
          }
          elseif (-not [string]::IsNullOrWhiteSpace("${{ inputs.maa_framework_download_url }}")) {
            .\scripts\prepare-maa-framework.ps1 -DownloadUrl "${{ inputs.maa_framework_download_url }}" -GithubToken "$env:MAA_FRAMEWORK_TOKEN"
          }
          else {
            .\scripts\prepare-maa-framework.ps1 -Version "${{ steps.release.outputs.maa_version }}" -GithubToken "$env:MAA_FRAMEWORK_TOKEN"
          }

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          $version = "${{ steps.release.outputs.version }}"

          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

          $cargoPath = "src-tauri/Cargo.toml"
          $cargo = Get-Content $cargoPath -Raw
          $cargo = $cargo -replace '(?m)^version = ".*"', "version = `"$version`""
          Set-Content -Path $cargoPath -Value $cargo

          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Ensure local release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $existing = git tag --list $tag
          if ([string]::IsNullOrWhiteSpace($existing)) {
            git tag $tag
          }

      - name: Generate changelog
        id: changelog
        run: |
          $body = .\scripts\generate-changelog.ps1 -Tag "${{ steps.release.outputs.tag }}" -Stdout

          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: "MaaInspector ${{ steps.release.outputs.tag }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          prerelease: false
          releaseDraft: false
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          projectPath: "."
          tauriScript: "pnpm tauri"
