name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  MAA_VERSION: "v5.10.0"

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm run test

  test-backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Git
        run: git config --global core.autocrlf false

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Download MaaFramework SDK
        shell: pwsh
        run: |
          $url = "https://github.com/MaaXYZ/MaaFramework/releases/download/${{ env.MAA_VERSION }}/MAA-win-x86_64-${{ env.MAA_VERSION }}.zip"
          $targetPath = "src-tauri/MAA-win-x86_64-${{ env.MAA_VERSION }}"

          if (Test-Path $targetPath) {
            Remove-Item $targetPath -Recurse -Force
          }

          $zipPath = "MAA-sdk.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $targetPath -Force
          Remove-Item $zipPath

          $sdkFullPath = "${{ github.workspace }}\$targetPath"
          "MAA_SDK_PATH=$sdkFullPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    needs: [test-frontend, test-backend]
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove package-lock.json
        shell: pwsh
        run: Remove-Item -Path "package-lock.json" -Force -ErrorAction SilentlyContinue

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Git
        run: git config --global core.autocrlf false

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Download MaaFramework SDK
        shell: pwsh
        run: |
          $url = "https://github.com/MaaXYZ/MaaFramework/releases/download/${{ env.MAA_VERSION }}/MAA-win-x86_64-${{ env.MAA_VERSION }}.zip"
          $targetPath = "src-tauri/MAA-win-x86_64-${{ env.MAA_VERSION }}"

          if (Test-Path $targetPath) {
            Remove-Item $targetPath -Recurse -Force
          }

          $zipPath = "MAA-sdk.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $targetPath -Force
          Remove-Item $zipPath

          $sdkFullPath = "${{ github.workspace }}\$targetPath"
          "MAA_SDK_PATH=$sdkFullPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'v0.0.0-ci'
          releaseName: 'CI Build'
          releaseDraft: true
          prerelease: true
          projectPath: "."
          tauriScript: "pnpm tauri"